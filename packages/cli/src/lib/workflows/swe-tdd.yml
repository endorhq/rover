# Software Engineering TDD Workflow
# This workflow implements a test-driven development lifecycle:
# context analysis, planning, test writing, implementation,
# test-fix loop, review, fixes, and summary
version: '1.0'
name: 'swe-tdd'
description: 'Test-driven development workflow that writes tests first, then implements and iterates until tests pass'

inputs:
  - name: title
    description: 'Task title'
    type: string
    required: true
  - name: description
    description: 'Detailed task description'
    type: string
    required: true
  - name: test_command
    description: 'Command to run tests (e.g. "npm test", "pytest")'
    type: string
    required: false
    default: 'npm test'

outputs:
  - name: summary
    description: 'Final implementation summary'
    type: file
    filename: summary.md
  - name: context
    description: 'Technical context analysis'
    type: file
    filename: context.md
  - name: plan
    description: 'Implementation plan'
    type: file
    filename: plan.md
  - name: changes
    description: 'Implementation changes and review fixes'
    type: file
    filename: changes.md

defaults:
  tool: claude
  model: sonnet

config:
  timeout: 3600
  continueOnError: false
  loopLimit: 5

steps:
  - id: context
    type: agent
    name: 'Context Analysis'
    prompt: |
      You are preparing a technical context for this TDD task implementation:

      Task title: {{inputs.title}}
      Task description: {{inputs.description}}
      Test command: {{inputs.test_command}}

      Follow these steps to complete it. Do not move to the next phase until you complete the previous one.

      1. Phase 1: Triage the task complexity.
         - Identify the task complexity by analyzing the affected files and the complexity of the task. Categorize it as:
           - Simple task: affects 1-3 files. No complex changes involved. The changes are straightforward and a plan might not be required.
           - Complex task: affects multiple files. It requires to introduce new libraries or create them. To properly implement them, it is recommended to first write a plan.
      2. Phase 2: Adapt your analysis depth:
         - For simple tasks: fill only the "Task Complexity", "Relevant Code", "Test Infrastructure" and "Extra OS packages" sections. Skip all other sections
         - For complex tasks: complete all sections.

      Follow these rules to complete the research:

      - Use 1-line bullets wherever possible. Do not fabricate content; if information is unavailable or irrelevant, skip it
      - Find the main file or files affected by these changes. Then, identify other secondary files. Focus mostly on main files and avoid a deep research in the secondary ones
      - Identify existing test files, test frameworks, and test configuration
      - Identify the test command and how to run tests for this project
      - Follow the template strictly
      - Just output the template. Skip any text before and after
      - Use globs when a change affects multiple files

      Then, write your structured analysis to `context.md` following this template. This is mandatory.

      <template>
      # Context

      ## Task complexity

      simple|complex

      ## Relevant code

      - path/to/file:start-end: 1-line description (include line numbers only if code is accessible)

      ## Test Infrastructure

      - Test framework: (e.g. vitest, jest, pytest, go test)
      - Test command: (the command to run relevant tests)
      - Existing test files: list of relevant test files
      - Test patterns: describe the testing conventions used in this project

      ## Extra OS packages

      Identify missing OS packages to accomplish this task and install them using the tools provided by the `package-manager` MCP. Return a list of new installed packages or "No additional packages required".

      ## Relevant knowledge

      Skip this entire section and title for simple tasks

      ### Patterns

      - pattern: brief description (only if non-standard)

      ### Dependencies

      - library name: 1-line description about why this library is relevant

      </template>

      IMPORTANT: After writing context.md, you MUST extract the task complexity value and the test command and return them.
    outputs:
      - name: complexity
        description: 'Task complexity: either "simple" or "complex"'
        type: string
      - name: test_command
        description: 'The command to run tests for this project'
        type: string
      - name: context_file
        description: 'Technical context analysis file'
        type: file
        filename: context.md

  - id: plan
    type: agent
    name: 'TDD Planning'
    prompt: |
      You are preparing a TDD implementation plan for this task:

      ---

      Title: {{inputs.title}}
      Description:
      {{inputs.description}}
      Context: {{steps.context.outputs.context_file}}

      ---

      Provide a clear, concise and actionable TDD plan that another engineer can follow.
      The plan MUST follow test-driven development: tests are written BEFORE implementation.

      Follow these steps to complete it. Do not move to the next phase until you complete the previous one.

      ### Phase 1: Evaluate task requirements

      - Read the provided context
      - Identify the complexity of the given task. Check the context.
      - Define a clear and concise objective for the plan
      - Specify the scope, focusing on the task objective
      - Identify files that will be affected by the changes
      - Identify existing test files that should be updated
      - Plan what tests need to be written to verify the implementation

      ### Phase 2: Write a TDD plan based on the task requirements.

      Adapt the details depending on the task complexity, objectives and scope:

      - Simple task: ≤3 steps max, short objective, scope limited to 1–3 files. Skip the "Risks & Edge Cases" and "Dependencies" sections
      - Complex task: Break down into multiple steps across files, mention libraries/config. Complete all sections

      ### Phase 3: Output

      - Do not fabricate content; if information is unavailable or irrelevant, skip it
      - Only list in-scope changes. Do not mention out-of-scope items.
      - Break down implementation into small, clear and concise steps. Do not overengineer, focus on the changes to complete the task and clear side effects.
      - The plan MUST have test-writing steps BEFORE implementation steps
      - Follow the template strictly
      - Just output the template. Skip any text before and after

      Write your plan to `plan.md` following this template. This is mandatory.

      <template>
      # TDD Implementation Plan

      ## Objective

      1-2 sentences describing the task objective

      ## Scope

      - List of changes that are in the task scope (one line each)

      ## Test Plan

      - [ ] Tests to write first (before implementation), with file paths and descriptions

      ## Implementation Steps

      - [ ] One line each, start with a verb, always include filenames, keep concise and actionable.

      ## Risks & Edge Cases

      - Potential pitfalls in 1 line each (skip if none)

      ## Dependencies

      - Prerequisite libraries, configs, or tasks (skip if none)
      </template>
    outputs:
      - name: plan_file
        description: 'TDD Implementation plan file'
        type: file
        filename: plan.md

  - id: write_tests
    type: agent
    name: 'Write Tests'
    prompt: |
      You are in TDD mode — writing tests BEFORE the implementation.

      ---

      Title: {{inputs.title}}
      Description:
      {{inputs.description}}

      Context:
      ```
      {{steps.context.outputs.context_file}}
      ```

      Plan:
      ```
      {{steps.plan.outputs.plan_file}}
      ```
      ---

      ### Phase 1: Review the test plan

      - Read the plan and context carefully
      - Identify which test files to create or modify
      - Understand the testing patterns used in this project

      ### Phase 2: Write failing tests

      1. Write tests that describe the expected behavior of the new code
      2. Follow existing test patterns and conventions in the project
      3. Tests should be comprehensive but focused on the task scope
      4. Tests MUST fail at this point (since implementation doesn't exist yet)
      5. Use the same test framework and patterns found in the context

      ### Phase 3: Output

      Write `test_changes.md` describing what tests you wrote and why. This is mandatory.

      <template>
      # Tests Written

      ## Test Files

      ### `path/to/test-file`

      **Purpose**: What behavior these tests verify
      **Tests added**:
      - Test name: brief description of what it verifies

      ## Expected Failures

      - List of tests that will fail until implementation is complete
      </template>
    outputs:
      - name: test_changes_file
        description: 'Description of tests written'
        type: file
        filename: test_changes.md

  - id: implement
    type: agent
    name: 'Implementation'
    prompt: |
      You are in implementation mode.
      Your task is to implement the code to make the tests pass.
      This is a TDD workflow — tests have already been written.

      ---

      Task:
      Title: {{inputs.title}}
      Description:
      {{inputs.description}}

      Context:
      ```
      {{steps.context.outputs.context_file}}
      ```

      Plan:
      ```
      {{steps.plan.outputs.plan_file}}
      ```

      Tests Written:
      ```
      {{steps.write_tests.outputs.test_changes_file}}
      ```
      ---

      ### Phase 1: Review tests and plan

      - Read the tests that have been written
      - Understand what the tests expect
      - Review the implementation plan

      ### Phase 2: Implementation process

      1. Follow the implementation steps in `plan.md` sequentially
      2. Reference `context.md` for technical constraints
      3. Make the tests pass — this is your primary goal
      4. Make minimal, maintainable changes that fit existing patterns
      5. Do not modify the test files unless absolutely necessary

      ### Phase 3: Output

      Write `changes.md` following this template. This is mandatory.

      <template>
      # Implementation Changes

      ## Overview

      1-2 sentences on what was implemented and why

      ## Files Modified

      ### `path/to/file.ts`

      **Purpose**: What this file does in the system
      **Changes made**:

      - Bullet list of actual changes with explanations

      ## Files Added

      ### `path/to/new-file.ts`

      **Purpose**: What this file does
      **Implementation details**:

      - Explanation of structure, functions, and integrations
      </template>
    outputs:
      - name: changes_file
        description: 'Implementation changes file'
        type: file
        filename: changes.md

  - id: test_fix_loop
    type: loop
    name: 'Test & Fix Loop'
    until: steps.run_tests.outputs.exit_code == 0
    maxIterations: 5
    steps:
      - id: run_tests
        type: command
        name: 'Run Tests'
        command: '{{inputs.test_command}}'

      - id: fix_code
        type: agent
        name: 'Fix Failing Tests'
        if: steps.run_tests.outputs.exit_code != 0
        prompt: |
          Tests are failing. Your job is to fix the implementation so all tests pass.

          ---

          Task:
          Title: {{inputs.title}}
          Description:
          {{inputs.description}}

          Test command output (stdout):
          ```
          {{steps.run_tests.outputs.stdout}}
          ```

          Test command errors (stderr):
          ```
          {{steps.run_tests.outputs.stderr}}
          ```

          Test exit code: {{steps.run_tests.outputs.exit_code}}

          Previous implementation changes:
          ```
          {{steps.implement.outputs.changes_file}}
          ```
          ---

          ### Instructions

          1. Analyze the test failures carefully
          2. Identify the root cause of each failure
          3. Fix the implementation code (NOT the tests) to make tests pass
          4. Only modify tests if they have genuine bugs (not just because they're failing)
          5. Make minimal, targeted fixes
          6. After making fixes, verify your changes are consistent with the project patterns
        outputs:
          - name: fixes_description
            description: 'Description of fixes applied'
            type: string

  - id: review
    type: agent
    name: 'Code Review'
    prompt: |
      You are in review mode, performing a strict code review for this TDD task.
      Examine the task context, plan, tests, and implementation.

      ---

      Title: {{inputs.title}}
      Description:
      {{inputs.description}}
      Task Complexity: {{steps.context.outputs.complexity}}

      Plan:
      ```
      {{steps.plan.outputs.plan_file}}
      ```

      Changes:
      ```
      {{steps.implement.outputs.changes_file}}
      ```
      ---

      ### Phase 1: Confirm if review is required

      Check the task complexity from above.

      - Simple task: skip the review entirely. Output: {"skipped": "true", "issues_found": "false"} and do NOT create any file. Stop here.
      - Complex task: continue with the next phase.

      ### Phase 2: For complex tasks, perform the review

      1. Compare the implementation in "Changes" against "Plan"
      2. Review code changes for quality, and adherence to existing patterns
      3. Verify task requirements are satisfied
      4. Check that tests are comprehensive and meaningful
      5. Check security concerns

      ### Phase 3: Output

      - If the implementation is satisfactory: output {"skipped": "false", "issues_found": "false"} and do NOT create any file.
      - Do not fabricate content; if information is unavailable or irrelevant, skip it
      - If issues are found: output {"skipped": "false", "issues_found": "true"} and create `review.md` with the following template:

      <template>
      # Code Review

      ## Overall Assessment

      Brief summary of the implementation quality and major concerns

      ## Plan Adherence Issues

      ### Deviations from plan.md:

      - [Deviation]: [Why it matters and what to do]

      ## Code Quality Issues

      ### [File path/section]

      **Issue**: [Concise description of the problem]
      **Severity**: Must Fix | Nice to have
      **Recommendation**: [Actionable action]
      **Code location**: [Line numbers or function names]

      ## Test Coverage

      - Assessment of test quality and coverage gaps

      ## Security Concerns

      ### [Specific security issue]

      **Risk**: [Concise Risk description]
      **Severity**: Must Fix | Nice to have
      **Recommendation**: [Actionable action]
      </template>
    outputs:
      - name: skipped
        description: 'Whether review was skipped (true/false)'
        type: string
      - name: issues_found
        description: 'Whether issues were found (true/false)'
        type: string
      - name: review_file
        description: 'Code review file with issues (only created if issues found)'
        type: file
        filename: review.md

  - id: apply_review
    type: agent
    name: 'Apply Review Fixes'
    if: steps.review.outputs.issues_found == true
    prompt: |
      You are in apply-review mode.

      ---

      Title: {{inputs.title}}
      Description:
      {{inputs.description}}

      Context:
      ```
      {{steps.context.outputs.context_file}}
      ```

      Review:
      ```
      {{steps.review.outputs.review_file}}
      ```

      ---

      ### Instructions

      1. Read all issues in Review
      2. Fix issues systematically by priority: Must Fix → Nice to have
      3. Follow review recommendations exactly — do not invent alternative solutions
      4. Ensure fixes preserve existing functionality and do not introduce regressions
      5. Reference Context for consistency
    outputs:
      - name: fixes_applied
        description: 'Whether fixes were applied (true/false)'
        type: string
      - name: review_fixes_file
        description: 'Updated changes file with review fixes appended'
        type: file
        filename: review_fixes.md

  - id: summary
    type: agent
    name: 'Summary'
    prompt: |
      You are in summary mode.

      ---

      Title: {{inputs.title}}
      Description:
      {{inputs.description}}
      Task Complexity: {{steps.context.outputs.complexity}}

      Context:
      ```
      {{steps.context.outputs.context_file}}
      ```

      Changes:
      ```
      {{steps.implement.outputs.changes_file}}
      ```

      Test-Fix Loop Iterations: {{steps.test_fix_loop.outputs.iterations}}
      Tests Passed: {{steps.test_fix_loop.outputs.condition_met}}
      ---

      ### Phase 1: Triage task complexity

      Check the context to identify the task complexity: {{steps.context.outputs.complexity}}

      - Simple task: skip the "Technical decisions" and "Notes" sections in phase 3.
      - Complex task: complete the full template in phase 3.

      ### Phase 2: For complex tasks

      - Use only information from Context and Changes
      - Do not fabricate content; if a section has nothing to report, write `None`
      - Keep all required sections concise: 1-2 sentences or one-line bullets only

      ### Phase 3: Output

      Write to `summary.md` following this template. This is mandatory.

      <template>
      # Implementation Summary

      ## What was implemented

      1-2 sentences describing the changes made

      ## TDD Results

      - Test-fix iterations: [number]
      - All tests passing: [yes/no]

      ## Files modified

      - `path/to/file`: Brief description of changes

      ## Technical decisions

      - Key decision and rationale (skip if none)

      ## Notes

      - Remaining tasks, considerations, or `None`
      </template>
    outputs:
      - name: summary_file
        description: 'Implementation summary file'
        type: file
        filename: summary.md
